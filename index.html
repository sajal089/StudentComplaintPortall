<body>

<header>
  <h2>College Issue Reporting System</h2>
</header>

<nav>
  <button onclick="showHome()">Home</button>
  <button onclick="showDashboard()">Dashboard (Technician)</button>
</nav>

<!-- HOME PAGE -->
<section id="home" class="active">
  <h3>Report an Issue</h3>
  <input type="text" id="room" placeholder="Room Number" required>
  <textarea id="description" placeholder="Describe the issue"></textarea>
  <input type="file" id="imageInput" accept="image/*">
  <button class="submit-btn" onclick="submitIssue()">Submit Issue</button>
</section>

<!-- DASHBOARD -->
<section id="dashboard">
  <h3>Reported Issues</h3>
  <div id="issuesList"></div>
</section>

<script>
function showHome() {
  document.getElementById("home").classList.add("active");
  document.getElementById("dashboard").classList.remove("active");
}

function showDashboard() {
  document.getElementById("dashboard").classList.add("active");
  document.getElementById("home").classList.remove("active");
  loadIssues();
}

function submitIssue() {
  const room = document.getElementById("room").value;
  const description = document.getElementById("description").value;
  const imageInput = document.getElementById("imageInput");

  if (!room || !description) {
    alert("Please fill all fields");
    return;
  }

  const reader = new FileReader();
  reader.onload = function () {
    const issue = {
      room,
      description,
      image: reader.result,
      status: "Pending"
    };

    let issues = JSON.parse(localStorage.getItem("issues")) || [];
    issues.push(issue);
    localStorage.setItem("issues", JSON.stringify(issues));

    alert("Issue Submitted Successfully!");
    document.getElementById("room").value = "";
    document.getElementById("description").value = "";
    imageInput.value = "";
  };

  if (imageInput.files[0]) {
    reader.readAsDataURL(imageInput.files[0]);
  } else {
    reader.onload();
  }
}

function loadIssues() {
  const issuesList = document.getElementById("issuesList");
  issuesList.innerHTML = "";

  let issues = JSON.parse(localStorage.getItem("issues")) || [];

  issues.forEach((issue, index) => {
    const div = document.createElement("div");
    div.className = "issue-card";
    div.innerHTML = `
      <strong>Room:</strong> ${issue.room}<br>
      <strong>Description:</strong> ${issue.description}<br>
      <strong>Status:</strong> ${issue.status}<br>
      ${issue.image ? `<img src="${issue.image}">` : ""}
      <br><button onclick="resolveIssue(${index})">Mark as Resolved</button>
    `;
    issuesList.appendChild(div);
  });
}

function resolveIssue(index) {
  let issues = JSON.parse(localStorage.getItem("issues"));
  issues[index].status = "Resolved";
  localStorage.setItem("issues", JSON.stringify(issues));
  loadIssues();
}
</script>

</body>
</html>
