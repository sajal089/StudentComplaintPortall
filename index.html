<!DOCTYPE html>
<html>
<head>
    <title>College Issue Reporting System</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            margin: 0;
        }

        nav {
            background: #1e4d3b;
            padding: 15px;
            text-align: center;
        }

        nav button {
            margin: 5px;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            background: white;
            border-radius: 5px;
        }

        .container {
            padding: 30px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button.submit-btn {
            background: #1e4d3b;
            color: white;
            padding: 10px 20px;
            border: none;
        }

        .hidden {
            display: none;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<nav>
    <button onclick="showHome()">Home</button>
    <button onclick="showDashboard()">Dashboard</button>
    <button onclick="showTechnician()">Technician</button>
</nav>

<div class="container">

    <!-- HOME -->
    <div id="home">
        <h2>Report an Issue</h2>

        <input type="text" id="room" placeholder="Enter Room Number">

        <textarea id="desc" placeholder="Describe the Issue"></textarea>

        <input type="file" id="image">

        <button class="submit-btn" onclick="submitIssue()">Submit</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden">
        <h2>Your Complaints</h2>
        <div id="studentComplaints"></div>
    </div>

    <!-- TECHNICIAN -->
    <div id="technician" class="hidden">
        <h2>Technician Panel</h2>
        <div id="allComplaints"></div>
    </div>

</div>

<script>
    let complaints = [];

    function showHome() {
        document.getElementById("home").classList.remove("hidden");
        document.getElementById("dashboard").classList.add("hidden");
        document.getElementById("technician").classList.add("hidden");
    }

    function showDashboard() {
        document.getElementById("home").classList.add("hidden");
        document.getElementById("dashboard").classList.remove("hidden");
        document.getElementById("technician").classList.add("hidden");
        loadStudentComplaints();
    }

    function showTechnician() {
        document.getElementById("home").classList.add("hidden");
        document.getElementById("dashboard").classList.add("hidden");
        document.getElementById("technician").classList.remove("hidden");
        loadAllComplaints();
    }

    function submitIssue() {
        let room = document.getElementById("room").value;
        let desc = document.getElementById("desc").value;

        if (room === "" || desc === "") {
            alert("Please fill all fields");
            return;
        }

        let complaint = {
            room: room,
            desc: desc,
            status: "Pending"
        };

        complaints.push(complaint);

        alert("Submitted Successfully ✅");
        alert("Complaint Raised Successfully 📩");

        document.getElementById("room").value = "";
        document.getElementById("desc").value = "";
    }

    function loadStudentComplaints() {
        let container = document.getElementById("studentComplaints");
        container.innerHTML = "";

        complaints.forEach(c => {
            container.innerHTML += `
                <div class="card">
                    <p><b>Room:</b> ${c.room}</p>
                    <p><b>Issue:</b> ${c.desc}</p>
                    <p><b>Status:</b> ${c.status}</p>
                </div>
            `;
        });
    }

    function loadAllComplaints() {
        let container = document.getElementById("allComplaints");
        container.innerHTML = "";

        complaints.forEach((c, index) => {
            container.innerHTML += `
                <div class="card">
                    <p><b>Room:</b> ${c.room}</p>
                    <p><b>Issue:</b> ${c.desc}</p>
                    <p><b>Status:</b> ${c.status}</p>
                    <button onclick="updateStatus(${index})">Mark Completed</button>
                </div>
            `;
        });
    }

    function updateStatus(index) {
        complaints[index].status = "Completed";
        loadAllComplaints();
        alert("Status Updated ✅");
    }
</script>

</body>
</html>
