<script>

let complaints = JSON.parse(localStorage.getItem("complaints")) || [];

function saveToLocal() {
    localStorage.setItem("complaints", JSON.stringify(complaints));
}

function showHome() {
    document.getElementById("home").classList.remove("hidden");
    document.getElementById("dashboard").classList.add("hidden");
    document.getElementById("technician").classList.add("hidden");
}

function showDashboard() {
    document.getElementById("home").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    document.getElementById("technician").classList.add("hidden");
    loadStudentComplaints();
}

function showTechnician() {
    document.getElementById("home").classList.add("hidden");
    document.getElementById("dashboard").classList.add("hidden");
    document.getElementById("technician").classList.remove("hidden");
    loadAllComplaints();
}

function submitIssue() {
    let room = document.getElementById("room").value;
    let desc = document.getElementById("desc").value;
    let fileInput = document.getElementById("image");
    let file = fileInput.files[0];

    if (!room || !desc || !file) {
        alert("Please fill all fields and upload image");
        return;
    }

    let reader = new FileReader();

    reader.onload = function(e) {
        let complaint = {
            room: room,
            desc: desc,
            image: e.target.result,
            status: "Pending"
        };

        complaints.push(complaint);
        saveToLocal();

        alert("Submitted Successfully ✅");
        alert("Complaint Raised Successfully 📩");

        document.getElementById("room").value = "";
        document.getElementById("desc").value = "";
        fileInput.value = "";
    };

    reader.readAsDataURL(file);
}

function loadStudentComplaints() {

    let container = document.getElementById("studentComplaints");
    container.innerHTML = "";

    // 🔹 Important Contacts Section
    container.innerHTML += `
        <div class="card">
            <h3>📞 Important Contacts</h3>
            <p><b>HOD Contact:</b> 9949606658</p>
            <p><b>Emergency Numbers:</b></p>
            <p>🚑 Ambulance: 108</p>
            <p>👮 Police: 100</p>
            <p>🔥 Fire: 101</p>
        </div>
    `;

    // 🔹 Technician Details Section
    container.innerHTML += `
        <div class="card">
            <h3>🛠 Technician Details</h3>
            <p><b>Name:</b> Bavuma</p>
            <p><b>Mobile:</b> 9911882277</p>
            <p><b>Room Number:</b> 100</p>
        </div>
    `;

    // 🔹 Complaints List
    complaints.forEach(c => {
        container.innerHTML += `
            <div class="card">
                <h3>📌 Complaint</h3>
                <p><b>Room:</b> ${c.room}</p>
                <p><b>Issue:</b> ${c.desc}</p>
                <p><b>Status:</b> ${c.status}</p>
                <img src="${c.image}">
            </div>
        `;
    });
}

function loadAllComplaints() {
    let container = document.getElementById("allComplaints");
    container.innerHTML = "";

    complaints.forEach((c, index) => {
        container.innerHTML += `
            <div class="card">
                <p><b>Room:</b> ${c.room}</p>
                <p><b>Issue:</b> ${c.desc}</p>
                <p><b>Status:</b> ${c.status}</p>
                <img src="${c.image}">
                <br><br>
                <button onclick="updateStatus(${index})">
                    Mark Completed
                </button>
            </div>
        `;
    });
}

function updateStatus(index) {
    complaints[index].status = "Completed";
    saveToLocal();
    loadAllComplaints();
    alert("Status Updated ✅");
}

</script>
